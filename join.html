<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>加入建築自動化 — 協作申請</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink:   oklch(18% 0.02 240);
    --paper: oklch(97% 0.008 80);
    --warm:  oklch(62% 0.14 55);
    --rule:  oklch(70% 0.01 240 / 0.25);
    --dim:   oklch(48% 0.01 240);
    --serif: 'DM Serif Display', Georgia, serif;
    --sans:  'DM Sans', system-ui, sans-serif;
  }

  body {
    min-height: 100vh;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    font-weight: 300;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(24px, 6vw, 60px) clamp(20px, 5vw, 40px);
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(var(--rule) 1px, transparent 1px),
      linear-gradient(90deg, var(--rule) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  .card {
    position: relative; z-index: 1;
    width: 100%;
    max-width: 520px;
  }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--warm);
    font-weight: 500;
    margin-bottom: 16px;
  }

  h1 {
    font-family: var(--serif);
    font-size: clamp(32px, 6vw, 52px);
    line-height: 1.05;
    letter-spacing: -0.02em;
    margin-bottom: 10px;
  }
  h1 em { font-style: italic; color: var(--warm); }

  .sub {
    font-size: 15px;
    line-height: 1.65;
    color: var(--dim);
    margin-bottom: 40px;
  }

  .rule { width: 40px; height: 2px; background: var(--warm); margin-bottom: 28px; }

  .field { margin-bottom: 24px; }

  label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 500;
    color: var(--dim);
    margin-bottom: 8px;
  }

  input, select {
    width: 100%;
    background: none;
    border: none;
    border-bottom: 1.5px solid oklch(80% 0.01 240);
    padding: 10px 0;
    font-family: var(--sans);
    font-size: 16px;
    font-weight: 300;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
    border-radius: 0;
    -webkit-appearance: none;
  }

  select {
    cursor: pointer;
    background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L6 7L11 1' stroke='%23888' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 4px center;
    padding-right: 24px;
  }

  input:focus, select:focus { border-color: var(--ink); }
  input::placeholder { color: oklch(75% 0.01 240); }

  .hint {
    font-size: 12px;
    color: var(--dim);
    margin-top: 6px;
    line-height: 1.5;
  }

  .btn {
    width: 100%;
    margin-top: 36px;
    padding: 16px 24px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.08em;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.2s, transform 0.1s;
  }
  .btn:hover { background: oklch(28% 0.02 240); }
  .btn:active { transform: scale(0.99); }
  .btn:disabled { opacity: 0.4; cursor: default; }

  /* 狀態訊息 */
  .msg {
    margin-top: 20px;
    padding: 14px 18px;
    font-size: 14px;
    line-height: 1.6;
    border-radius: 2px;
    display: none;
  }
  .msg.ok  { background: oklch(95% 0.04 145); color: oklch(35% 0.12 145); border-left: 3px solid oklch(55% 0.15 145); }
  .msg.err { background: oklch(96% 0.04 25);  color: oklch(40% 0.15 25);  border-left: 3px solid oklch(60% 0.18 25); }
  .msg.show { display: block; }

  /* 成功畫面 */
  .success-view {
    text-align: center;
    display: none;
  }
  .success-view.show { display: block; }
  .success-view .check {
    font-family: var(--serif);
    font-size: 72px;
    color: var(--warm);
    line-height: 1;
    margin-bottom: 20px;
  }
  .success-view h2 {
    font-family: var(--serif);
    font-size: 32px;
    margin-bottom: 12px;
  }
  .success-view p { color: var(--dim); font-size: 15px; line-height: 1.7; }

  @media (max-width: 480px) {
    input, select { font-size: 16px; }
  }
</style>
</head>
<body>
<div class="card">

  <!-- 表單 -->
  <div id="form-view">
    <p class="eyebrow">建築自動化 開源系統</p>
    <h1>加入<em>協作，</em><br>讓系統更聰明。</h1>
    <div class="rule"></div>
    <p class="sub">填寫申請後，管理員會邀請你的 GitHub 帳號加入，你就可以開始貢獻自己負責的 Squad。</p>

    <form id="join-form">
      <div class="field">
        <label>姓名 *</label>
        <input type="text" name="name" placeholder="王小明" required>
      </div>

      <div class="field">
        <label>Email *</label>
        <input type="email" name="email" placeholder="yourname@example.com" required>
      </div>

      <div class="field">
        <label>負責的 Squad *</label>
        <select name="squad" required>
          <option value="" disabled selected>選擇你的 Squad</option>
          <option value="S03 法規智慧組">S03 — 法規智慧組（法規、容積率、地籍）</option>
          <option value="S04 建築設計組">S04 — 建築設計組（體量、結構、立面）</option>
          <option value="S05 室內設計組">S05 — 室內設計組（風格、照明、軟裝）</option>
          <option value="S06 BIM技術組">S06 — BIM 技術組（Revit、LOD、IFC）</option>
          <option value="S07 案例管理組">S07 — 案例管理組（作品集、造價基準）</option>
          <option value="S08 永續節能組">S08 — 永續節能組（EEWH、ESG、碳足跡）</option>
          <option value="S09 行政整合組">S09 — 行政整合組（甘特圖、建照申請）</option>
          <option value="S10 行銷公關組">S10 — 行銷公關組（提案書、品牌、社群）</option>
          <option value="S11 財務管理組">S11 — 財務管理組（ROI、造價、融資）</option>
          <option value="S12 數據採集組">S12 — 數據採集組（物價、法規監測）</option>
          <option value="IT 進化組">IT — 進化組（系統監控、部署）</option>
        </select>
      </div>

      <div class="field">
        <label>GitHub 帳號</label>
        <input type="text" name="github" placeholder="your-github-username（沒有可留空）">
        <p class="hint">沒有 GitHub 帳號？申請很簡單，前往 <strong>github.com</strong> 用 Email 註冊即可。</p>
      </div>

      <button type="submit" class="btn" id="submit-btn">送出申請</button>
    </form>

    <div class="msg" id="msg"></div>
  </div>

  <!-- 成功畫面 -->
  <div class="success-view" id="success-view">
    <div class="check">✦</div>
    <h2>申請已送出</h2>
    <p>管理員收到後會邀請你的 GitHub 帳號。<br>收到邀請 Email 後，接受邀請即可開始貢獻。</p>
  </div>

</div>

<script>
  const form = document.getElementById('join-form');
  const btn  = document.getElementById('submit-btn');
  const msg  = document.getElementById('msg');

  form.addEventListener('submit', async e => {
    e.preventDefault();
    btn.disabled = true;
    btn.textContent = '送出中…';
    msg.className = 'msg';

    const data = Object.fromEntries(new FormData(form));

    try {
      const res = await fetch('/api/join', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });

      if (res.ok) {
        document.getElementById('form-view').style.display = 'none';
        document.getElementById('success-view').classList.add('show');
      } else {
        throw new Error('送出失敗，請稍後再試。');
      }
    } catch (err) {
      msg.textContent = err.message;
      msg.className = 'msg err show';
      btn.disabled = false;
      btn.textContent = '送出申請';
    }
  });
</script>
</body>
</html>
